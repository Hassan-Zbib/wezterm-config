- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ['~']

- link:
    ~/.wezterm.lua: home/.wezterm.lua
    ~/.bashrc: home/.bashrc
    ~/.bash_profile: home/.bash_profile
    ~/.gitconfig: home/.gitconfig
    ~/.vimrc: home/.vimrc
    ~/.config/starship.toml: home/.config/starship.toml
    ~/.config/git/ignore: home/.config/git/ignore
    ~/.config/fastfetch/config.jsonc: home/.config/fastfetch/config.jsonc
    ~/.config/eza/theme.yml: home/.config/eza/theme.yml
    ~/.config/ccstatusline/settings.json: home/.config/ccstatusline/settings.json
    ~/AppData/Roaming/yazi/config/yazi.toml: home/AppData/Roaming/yazi/config/yazi.toml
    ~/AppData/Roaming/yazi/config/theme.toml: home/AppData/Roaming/yazi/config/theme.toml
    ~/AppData/Roaming/yazi/config/init.lua: home/AppData/Roaming/yazi/config/init.lua
    ~/AppData/Roaming/yazi/config/keymap.toml: home/AppData/Roaming/yazi/config/keymap.toml
    ~/Documents/PowerShell/Microsoft.PowerShell_profile.ps1: home/Documents/PowerShell/Microsoft.PowerShell_profile.ps1
    ~/.config/wsl/wezterm-integration.bash: home/.config/wsl/wezterm-integration.bash
    ~/AppData/Local/Packages/Microsoft.DesktopAppInstaller_8wekyb3d8bbwe/LocalState/settings.json: home/AppData/Local/Packages/Microsoft.DesktopAppInstaller_8wekyb3d8bbwe/LocalState/settings.json
    ~/bin/lazyssh.exe: bin/lazyssh.exe
    ~/bin/git: bin/git

- create:
    - ~/.config/wezterm/sessions
    - ~/bin

- winget:
    # required
    - wez.wezterm.nightly
    - Microsoft.PowerShell
    - Git.Git
    - DEVCOM.JetBrainsMonoNerdFont
    - Starship.Starship
    - sxyazi.yazi
    - Fastfetch-cli.Fastfetch
    # optional CLI tools
    - JesseDuffield.lazygit
    - eza-community.eza
    - aristocratos.btop4win
    - charmbracelet.glow
    - Devolutions.UniGetUI
    - tstack.lnav
    - ajeetdsouza.zoxide
    - junegunn.fzf

- shell:
    - command: wsl -e bash -c "grep -q 'wezterm-integration.bash' ~/.bashrc 2>/dev/null || echo '[ -f /mnt/c/Users/hassa/.config/wsl/wezterm-integration.bash ] && source /mnt/c/Users/hassa/.config/wsl/wezterm-integration.bash' >> ~/.bashrc"
      description: Injecting WezTerm shell integration into WSL .bashrc
      quiet: true
    - command: ya pkg add yazi-rs/plugins:git || true
      description: Adding yazi git plugin
      quiet: true
    - command: ya pkg add Rolv-Apneseth/starship || true
      description: Adding yazi starship plugin
      quiet: true
    - command: ya pkg install
      description: Installing/updating all yazi plugins
      quiet: true
    - command: echo "Dotbot install complete!"
      description: Done
      quiet: true
