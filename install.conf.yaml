- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ['~']

- link:
    ~/.wezterm.lua: home/.wezterm.lua
    ~/.bashrc: home/.bashrc
    ~/.bash_profile: home/.bash_profile
    ~/.gitconfig: home/.gitconfig
    ~/.config/starship.toml: home/.config/starship.toml
    ~/.config/git/ignore: home/.config/git/ignore
    ~/.config/fastfetch/config.jsonc: home/.config/fastfetch/config.jsonc
    ~/Documents/PowerShell/Microsoft.PowerShell_profile.ps1: home/Documents/PowerShell/Microsoft.PowerShell_profile.ps1
    ~/.config/wsl/wezterm-integration.bash: home/.config/wsl/wezterm-integration.bash

- create:
    - ~/.config/wezterm/sessions

- winget:
    # required
    - wez.wezterm.nightly
    - Microsoft.PowerShell
    - Git.Git
    - DEVCOM.JetBrainsMonoNerdFont
    - Starship.Starship
    - sxyazi.yazi
    - Fastfetch-cli.Fastfetch
    # optional CLI tools
    - JesseDuffield.lazygit
    - eza-community.eza
    - aristocratos.btop4win
    - charmbracelet.glow
    - MartiCliment.UniGetUI

- shell:
    - command: wsl -e bash -c "grep -q 'wezterm-integration.bash' ~/.bashrc 2>/dev/null || echo '[ -f /mnt/c/Users/Hasan/.config/wsl/wezterm-integration.bash ] && source /mnt/c/Users/Hasan/.config/wsl/wezterm-integration.bash' >> ~/.bashrc"
      description: Injecting WezTerm shell integration into WSL .bashrc
      quiet: true
    - command: echo "Dotbot install complete!"
      description: Done
      quiet: true
