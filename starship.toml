# ============================================================
# Starship Prompt Configuration
# ============================================================

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

# Wait 10ms for starship to check files under the current directory.
scan_timeout = 10
command_timeout = 1000

# ---- Prompt Character ----
[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'

# ---- OS Icon ----
[os]
disabled = false
style = 'bold blue'

[os.symbols]
Windows = ' '

# ---- Directory ----
[directory]
style = 'bold cyan'
truncation_length = 3
truncate_to_repo = true
read_only = ' 󰌾'
home_symbol = '~'

# ---- Git ----
[git_branch]
symbol = ' '
style = 'bold purple'
format = 'on [$symbol$branch]($style) '

[git_status]
style = 'bold yellow'
format = '([$all_status$ahead_behind]($style) )'
conflicted = '󰞇 '
ahead = '⇡${count} '
behind = '⇣${count} '
diverged = '⇕⇡${ahead_count}⇣${behind_count} '
untracked = '? '
stashed = ' '
modified = '! '
staged = '+ '
deleted = '✘ '

# ---- Languages (only shows when relevant files exist) ----
[nodejs]
symbol = ' '
style = 'bold green'
format = 'via [$symbol($version)]($style) '

[python]
symbol = ' '
style = 'bold yellow'
format = 'via [$symbol($version)]($style) '

[rust]
symbol = ' '
style = 'bold red'
format = 'via [$symbol($version)]($style) '

[golang]
symbol = ' '
style = 'bold cyan'
format = 'via [$symbol($version)]($style) '

# ---- Command Duration (shows if cmd took > 2s) ----
[cmd_duration]
min_time = 2_000
style = 'bold yellow'
format = 'took [$duration]($style) '

# ---- Username (only shows over SSH) ----
[username]
show_always = false
style_user = 'bold yellow'
format = '[$user]($style) in '
